name: water_level_mobile
description: A new Flutter application for monitoring water levels.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  get_storage: ^2.1.1
  google_fonts: ^8.0.2
  http: ^1.2.0
  vibration: ^2.0.1
  flutter_ringtone_player: ^4.0.0+4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
